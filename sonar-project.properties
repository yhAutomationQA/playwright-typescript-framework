sonar.projectKey=yhautomationqa
sonar.projectName=Playwright TypeScript Automation Framework
sonar.projectVersion=1.0
sonar.organization=yhAutomationQA

sonar.sources=pages,helpers,utils,config,fixtures,api
sonar.tests=tests
sonar.test.inclusions=tests/**/*.spec.ts

sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.log,**/allure-results/**,**/allure-report/**,**/playwright-report/**,**/test-results/**,**/screenshots/**,**/logs/**
sonar.test.exclusions=**/node_modules/**,**/dist/**

sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
